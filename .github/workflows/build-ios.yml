name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Create missing config.xml
        run: |
          if [ ! -f ios/App/App/config.xml ]; then
            cat > ios/App/App/config.xml << 'XMLEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>租房评分</name>
          </widget>
          XMLEOF
          fi

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS App
        run: |
          set -o pipefail
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee xcodebuild.log

      - name: Create clean IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Release-iphoneos/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find App.app"
            exit 1
          fi
          echo "Found: $APP_PATH"

          # Step 1: Copy app bundle, resolving ALL symlinks to real files
          echo "=== Step 1: Copy with symlink resolution ==="
          rm -rf /tmp/ipa-build
          mkdir -p /tmp/ipa-build/Payload
          cp -RL "$APP_PATH" /tmp/ipa-build/Payload/App.app

          # Step 2: Verify no symlinks remain
          echo "=== Step 2: Check for remaining symlinks ==="
          SYMLINKS=$(find /tmp/ipa-build/Payload -type l 2>/dev/null)
          if [ -n "$SYMLINKS" ]; then
            echo "WARNING: Found symlinks, replacing with targets..."
            echo "$SYMLINKS"
            # Replace each symlink with its target
            find /tmp/ipa-build/Payload -type l -exec sh -c '
              for link; do
                target="$(readlink -f "$link")"
                if [ -e "$target" ]; then
                  rm "$link"
                  cp -RL "$target" "$link"
                else
                  echo "BROKEN: $link -> $target"
                  rm "$link"
                fi
              done
            ' sh {} +
          else
            echo "No symlinks found - OK"
          fi

          # Double check
          REMAINING=$(find /tmp/ipa-build/Payload -type l 2>/dev/null | wc -l)
          echo "Remaining symlinks: $REMAINING"

          # Step 3: Verify framework structure
          echo "=== Step 3: Framework structure ==="
          for fw in /tmp/ipa-build/Payload/App.app/Frameworks/*.framework; do
            if [ -d "$fw" ]; then
              echo "--- $(basename $fw) ---"
              ls -la "$fw/"
              # Check the framework binary exists and is a real file
              FW_NAME=$(basename "$fw" .framework)
              if [ -f "$fw/$FW_NAME" ]; then
                echo "Binary OK: $fw/$FW_NAME ($(stat -f%z "$fw/$FW_NAME") bytes)"
              else
                echo "ERROR: Missing binary $fw/$FW_NAME"
              fi
            fi
          done

          # Step 4: Ad-hoc sign (frameworks first, then app)
          echo "=== Step 4: Ad-hoc signing ==="
          for fw in /tmp/ipa-build/Payload/App.app/Frameworks/*.framework; do
            if [ -d "$fw" ]; then
              FW_NAME=$(basename "$fw" .framework)
              # Sign the framework binary first
              if [ -f "$fw/$FW_NAME" ]; then
                echo "Signing binary: $fw/$FW_NAME"
                codesign --force --sign - --timestamp=none "$fw/$FW_NAME" 2>&1 || true
              fi
              # Then sign the framework bundle
              echo "Signing framework: $(basename $fw)"
              codesign --force --sign - --timestamp=none "$fw" 2>&1 || true
            fi
          done
          echo "Signing app bundle"
          codesign --force --sign - --timestamp=none /tmp/ipa-build/Payload/App.app 2>&1 || true

          # Step 5: Verify signature
          echo "=== Step 5: Verify signature ==="
          codesign -dv /tmp/ipa-build/Payload/App.app 2>&1 | head -8

          # Step 6: Create IPA
          echo "=== Step 6: Create IPA ==="
          cd /tmp/ipa-build
          zip -r ~/work/rent-score/rent-score/RentScore.ipa Payload/
          cd ~/work/rent-score/rent-score

          # Step 7: Final verification
          echo "=== Step 7: Final verification ==="
          ls -lh RentScore.ipa
          echo "=== Top-level IPA structure ==="
          unzip -l RentScore.ipa | grep -E "^.*Payload/[^/]+/$" | head -5
          echo "=== Framework binaries in IPA ==="
          unzip -l RentScore.ipa | grep -E "Frameworks/[^/]+/[^/]+$" | grep -v "CodeResources\|Info.plist\|PrivacyInfo"
          echo "=== Main executable ==="
          unzip -l RentScore.ipa | grep "Payload/App.app/App$"
          echo "=== Total file count ==="
          unzip -l RentScore.ipa | tail -1

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RentScore-iOS
          path: RentScore.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/App/xcodebuild.log

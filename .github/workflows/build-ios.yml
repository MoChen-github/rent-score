name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Create missing config.xml
        run: |
          if [ ! -f ios/App/App/config.xml ]; then
            cat > ios/App/App/config.xml << 'XMLEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>租房评分</name>
          </widget>
          XMLEOF
          fi

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS App
        run: |
          set -o pipefail
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_BITCODE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee xcodebuild.log

      - name: Find and package IPA
        run: |
          echo "=== Searching for .app ==="
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Release-iphoneos/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find App.app"
            exit 1
          fi
          echo "Found: $APP_PATH"

          # Check executable and frameworks
          echo "=== App contents ==="
          ls -la "$APP_PATH/"
          echo "=== Frameworks ==="
          ls -la "$APP_PATH/Frameworks/" 2>/dev/null || echo "No Frameworks directory"
          echo "=== Framework symlinks ==="
          find "$APP_PATH/Frameworks" -type l 2>/dev/null || echo "No symlinks"

          # Resolve all symlinks by copying with -L flag
          # This converts symlinks to real files so Windows/Sideloadly can read them
          echo "=== Resolving symlinks ==="
          mkdir -p Payload
          cp -RL "$APP_PATH" Payload/ 2>/dev/null || cp -r "$APP_PATH" Payload/

          # Verify resolved frameworks
          echo "=== Resolved Frameworks ==="
          find Payload/App.app/Frameworks -type l 2>/dev/null && echo "WARNING: Symlinks still exist!" || echo "All symlinks resolved"
          ls -la Payload/App.app/Frameworks/ 2>/dev/null

          # Ad-hoc codesign (sign inner frameworks first, then app)
          echo "=== Ad-hoc signing ==="
          for fw in Payload/App.app/Frameworks/*.framework; do
            if [ -d "$fw" ]; then
              echo "Signing $fw"
              codesign --force --sign - "$fw" 2>&1 || true
            fi
          done
          echo "Signing app bundle"
          codesign --force --sign - Payload/App.app 2>&1 || true

          # Create IPA (no --symlinks, all files are real)
          echo "=== Creating IPA ==="
          zip -r RentScore.ipa Payload/
          echo "=== IPA size ==="
          ls -lh RentScore.ipa

          # Verify IPA
          echo "=== IPA contents (first 30) ==="
          unzip -l RentScore.ipa | head -30
          echo "=== All framework files in IPA ==="
          unzip -l RentScore.ipa | grep "Frameworks" | head -20
          echo "=== Check executable ==="
          unzip -l RentScore.ipa | grep "Payload/App.app/App$" || echo "WARNING: No executable"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RentScore-iOS
          path: RentScore.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/App/xcodebuild.log

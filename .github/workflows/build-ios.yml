name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Create missing config.xml
        run: |
          if [ ! -f ios/App/App/config.xml ]; then
            cat > ios/App/App/config.xml << 'XMLEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>租房评分</name>
          </widget>
          XMLEOF
          fi

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS App
        run: |
          set -o pipefail
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_BITCODE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee xcodebuild.log

      - name: Find and package IPA
        run: |
          echo "=== Searching for .app ==="
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Release-iphoneos/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find App.app"
            find ~/Library/Developer/Xcode/DerivedData -maxdepth 6 -type d 2>/dev/null
            exit 1
          fi
          echo "Found: $APP_PATH"
          echo "=== Contents ==="
          ls -la "$APP_PATH"

          # Ad-hoc codesign all frameworks and the app
          echo "=== Ad-hoc signing ==="
          find "$APP_PATH/Frameworks" -name "*.framework" -type d 2>/dev/null | while read fw; do
            echo "Signing $fw"
            codesign --force --sign - "$fw" 2>/dev/null || true
          done
          find "$APP_PATH/Frameworks" -name "*.dylib" -type f 2>/dev/null | while read dy; do
            echo "Signing $dy"
            codesign --force --sign - "$dy" 2>/dev/null || true
          done
          codesign --force --sign - "$APP_PATH" 2>/dev/null || true
          echo "=== Signed ==="

          # Package IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r RentScore.ipa Payload
          echo "=== IPA size ==="
          ls -lh RentScore.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RentScore-iOS
          path: RentScore.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/App/xcodebuild.log

name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Create missing config.xml
        run: |
          if [ ! -f ios/App/App/config.xml ]; then
            cat > ios/App/App/config.xml << 'XMLEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>租房评分</name>
          </widget>
          XMLEOF
          fi

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS App
        run: |
          set -o pipefail
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_BITCODE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee xcodebuild.log

      - name: Create IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Release-iphoneos/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find App.app"
            exit 1
          fi
          echo "Found: $APP_PATH"

          # Use ditto (Apple's tool) to copy app bundle - preserves structure, resource forks, HFS metadata
          mkdir -p Payload
          ditto "$APP_PATH" Payload/App.app

          # Verify the copy
          echo "=== Payload/App.app contents ==="
          ls -la Payload/App.app/
          echo "=== Frameworks ==="
          ls -la Payload/App.app/Frameworks/ 2>/dev/null || echo "No Frameworks"
          echo "=== Check for broken symlinks ==="
          find Payload/App.app -type l ! -exec test -e {} \; -print 2>/dev/null || echo "No broken symlinks"

          # Ad-hoc sign frameworks first, then the app
          echo "=== Ad-hoc signing ==="
          for fw in Payload/App.app/Frameworks/*.framework; do
            if [ -d "$fw" ]; then
              echo "Signing framework: $fw"
              codesign --force --sign - "$fw" 2>&1
            fi
          done
          echo "Signing app"
          codesign --force --sign - Payload/App.app 2>&1
          echo "=== Verify signature ==="
          codesign -dv Payload/App.app 2>&1 | head -10

          # Create IPA using ditto (creates clean zip without __MACOSX)
          echo "=== Creating IPA ==="
          ditto -c -k --sequesterRsrc --keepParent Payload RentScore.ipa
          echo "=== IPA size ==="
          ls -lh RentScore.ipa

          # Also create with standard zip for comparison
          cd Payload
          zip -r ../RentScore-standard.ipa .
          cd ..
          echo "=== Standard IPA size ==="
          ls -lh RentScore-standard.ipa

          # Verify both
          echo "=== ditto IPA contents ==="
          unzip -l RentScore.ipa | head -30
          echo "=== standard IPA contents ==="
          unzip -l RentScore-standard.ipa | head -30

          # Compute checksums
          echo "=== SHA256 ==="
          shasum -a 256 RentScore.ipa
          shasum -a 256 RentScore-standard.ipa

      - name: Upload IPA (ditto)
        uses: actions/upload-artifact@v4
        with:
          name: RentScore-iOS-ditto
          path: RentScore.ipa

      - name: Upload IPA (standard)
        uses: actions/upload-artifact@v4
        with:
          name: RentScore-iOS-standard
          path: RentScore-standard.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/App/xcodebuild.log

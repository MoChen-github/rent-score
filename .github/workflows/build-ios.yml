name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Create missing config.xml
        run: |
          if [ ! -f ios/App/App/config.xml ]; then
            cat > ios/App/App/config.xml << 'XMLEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>租房评分</name>
          </widget>
          XMLEOF
          fi

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS App
        run: |
          set -o pipefail
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_BITCODE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee xcodebuild.log

      - name: Create IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -path "*/Release-iphoneos/*" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find App.app"
            exit 1
          fi
          echo "Found: $APP_PATH"

          # Create correct IPA structure: Payload/App.app/
          mkdir -p Payload
          ditto "$APP_PATH" Payload/App.app

          # Verify structure
          echo "=== Verifying IPA structure ==="
          ls -la Payload/
          ls -la Payload/App.app/ | head -15
          echo "=== Checking executable ==="
          file Payload/App.app/App
          echo "=== Checking Info.plist ==="
          plutil -p Payload/App.app/Info.plist | grep -E "CFBundleIdentifier|CFBundleVersion|CFBundleShortVersionString|CFBundleExecutable"

          # Do NOT ad-hoc sign - let Sideloadly handle signing with user's Apple ID
          # Ad-hoc signing can conflict with Sideloadly's re-signing process

          # Create IPA from project root (so paths are Payload/App.app/...)
          # NOT from inside Payload directory
          zip -r RentScore.ipa Payload/
          echo "=== IPA size ==="
          ls -lh RentScore.ipa

          # CRITICAL: Verify IPA has correct structure
          echo "=== Verifying IPA internal paths ==="
          unzip -l RentScore.ipa | head -10
          echo "..."
          echo "=== Checking for Payload/ prefix ==="
          unzip -l RentScore.ipa | grep "^.*Payload/App.app/$" && echo "OK: Payload/App.app/ found" || echo "ERROR: Missing Payload/ prefix!"
          echo "=== Checking executable path ==="
          unzip -l RentScore.ipa | grep "Payload/App.app/App$" && echo "OK: Executable found at correct path" || echo "ERROR: Executable not at Payload/App.app/App"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RentScore-iOS
          path: RentScore.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/App/xcodebuild.log

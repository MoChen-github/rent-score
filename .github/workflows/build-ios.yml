name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Create missing config.xml
        run: |
          if [ ! -f ios/App/App/config.xml ]; then
            cat > ios/App/App/config.xml << 'XMLEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>租房评分</name>
          </widget>
          XMLEOF
          fi

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS App (unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_BITCODE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            2>&1 | tee xcodebuild.log

      - name: Export IPA
        run: |
          echo "=== Archive contents ==="
          find ios/App/build/App.xcarchive -name "*.app" 2>/dev/null || echo "No .app found in archive"
          echo "=== Full archive structure ==="
          find ios/App/build/App.xcarchive -maxdepth 4 -type d 2>/dev/null || echo "Archive directory not found"

          APP_PATH=$(find ios/App/build/App.xcarchive -name "*.app" -maxdepth 5 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find .app in archive"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r RentScore.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RentScore-iOS
          path: RentScore.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ios/App/xcodebuild.log

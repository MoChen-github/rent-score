name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: node node_modules/@capacitor/cli/bin/capacitor sync ios

      - name: Create missing config.xml
        run: |
          if [ ! -f ios/App/App/config.xml ]; then
            cat > ios/App/App/config.xml << 'XMLEOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
            <name>租房评分</name>
          </widget>
          XMLEOF
          fi

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build and Archive
        run: |
          set -o pipefail
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee xcodebuild.log

      - name: Create ExportOptions.plist
        run: |
          cat > ios/App/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>debug</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string></string>
              <key>uploadSymbols</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA from Archive
        run: |
          cd ios/App
          # First try: exportArchive (standard Apple method)
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa-output \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            2>&1 | tee export.log || true

          # Check if exportArchive produced an IPA
          if find build/ipa-output -name "*.ipa" -type f 2>/dev/null | head -1 | grep -q .; then
            IPA=$(find build/ipa-output -name "*.ipa" -type f | head -1)
            echo "exportArchive produced: $IPA"
            cp "$IPA" ../../RentScore.ipa
          else
            echo "exportArchive failed, using manual IPA creation..."
            # Manual method: find .app in archive, create IPA
            APP_PATH=$(find build/App.xcarchive -name "App.app" -type d | head -1)
            if [ -z "$APP_PATH" ]; then
              echo "ERROR: No App.app found in archive"
              find build/App.xcarchive -maxdepth 5 -type d 2>/dev/null
              exit 1
            fi
            echo "Found: $APP_PATH"

            # Create Payload structure
            rm -rf /tmp/Payload
            mkdir -p /tmp/Payload
            ditto "$APP_PATH" /tmp/Payload/App.app

            # Ad-hoc sign frameworks then app (required for Sideloadly)
            echo "=== Signing frameworks ==="
            for fw in /tmp/Payload/App.app/Frameworks/*.framework; do
              if [ -d "$fw" ]; then
                echo "Signing: $(basename $fw)"
                codesign --force --sign - --timestamp=none "$fw" 2>&1
              fi
            done
            echo "=== Signing app ==="
            codesign --force --sign - --timestamp=none /tmp/Payload/App.app 2>&1

            # Verify
            echo "=== Verify signature ==="
            codesign -dv /tmp/Payload/App.app 2>&1 | head -5

            # Package IPA
            cd /tmp
            zip -r ~/work/rent-score/rent-score/RentScore.ipa Payload/
            cd ~/work/rent-score/rent-score
          fi

          echo "=== Final IPA ==="
          ls -lh RentScore.ipa
          unzip -l RentScore.ipa | head -15
          echo "..."
          unzip -l RentScore.ipa | grep "Payload/App.app/App$" && echo "OK: Executable at correct path" || echo "ERROR: No executable"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RentScore-iOS
          path: RentScore.ipa

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: |
            ios/App/xcodebuild.log
            ios/App/export.log

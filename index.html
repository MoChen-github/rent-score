<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="租房评分">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="theme-color" content="#e8a838">
<title>租房综合评分工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg-card: #181b24;
    --bg-card-hover: #1e2230;
    --fg: #e8e6e1;
    --fg-muted: #8a8d97;
    --accent: #e8a838;
    --accent-dim: rgba(232, 168, 56, 0.15);
    --accent-glow: rgba(232, 168, 56, 0.3);
    --danger: #e85858;
    --success: #38c878;
    --border: #2a2d38;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -30%; left: -10%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(232,168,56,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%; right: -10%;
    width: 50vw; height: 50vw;
    background: radial-gradient(circle, rgba(56,200,120,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .container {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* 头部 */
  .header {
    text-align: center; margin-bottom: 32px;
    animation: fadeUp 0.8s ease;
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-weight: 900; font-size: 2.4rem;
    letter-spacing: 0.06em; color: var(--fg); margin-bottom: 8px;
  }
  .header h1 span { color: var(--accent); }
  .header p {
    color: var(--fg-muted); font-size: 0.95rem;
    font-weight: 300; letter-spacing: 0.04em;
  }

  /* 整体布局：左侧边栏 + 右侧内容 */
  .app-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* 左侧边栏 */
  .sidebar {
    position: sticky; top: 20px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    animation: fadeUp 0.8s ease 0.15s both;
  }
  .sidebar-title {
    font-size: 0.82rem; color: var(--fg-muted);
    font-weight: 500; margin-bottom: 12px;
    padding: 0 4px; letter-spacing: 0.04em;
  }
  .sidebar-add {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .sidebar-add input {
    flex: 1; min-width: 0;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px;
    color: var(--fg); font-size: 0.82rem; font-family: inherit;
    outline: none; transition: border-color 0.3s;
  }
  .sidebar-add input:focus { border-color: var(--accent); }
  .sidebar-add input::placeholder { color: rgba(138,141,151,0.5); font-size: 0.78rem; }
  .btn-add-small {
    background: var(--accent); color: var(--bg); border: none;
    border-radius: 6px; padding: 8px 12px;
    font-size: 0.82rem; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: transform 0.2s; white-space: nowrap;
    min-height: 36px;
  }
  .btn-add-small:hover { transform: translateY(-1px); }

  /* 房源列表 */
  .house-list {
    display: flex; flex-direction: column; gap: 4px;
    margin-bottom: 12px;
  }
  .house-item {
    display: flex; align-items: center; gap: 0;
    background: transparent; border: 1px solid transparent;
    border-radius: 8px; overflow: hidden;
    font-size: 0.85rem; color: var(--fg-muted);
    cursor: pointer; transition: all 0.2s;
  }
  .house-item:hover { background: var(--bg-card-hover); }
  .house-item.active {
    background: var(--accent-dim); border-color: var(--accent);
    color: var(--accent); font-weight: 500;
  }
  .house-item-name {
    flex: 1; padding: 10px 12px; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .house-item .del-btn {
    padding: 10px 10px; color: var(--fg-muted);
    cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; min-width: 32px; min-height: 36px;
    opacity: 0;
  }
  .house-item:hover .del-btn { opacity: 1; }
  .house-item .del-btn:hover { color: var(--danger); background: rgba(232,88,88,0.1); }

  .sidebar-delete {
    width: 100%; background: transparent; border: 1px solid var(--border);
    border-radius: 8px; padding: 8px; font-size: 0.78rem;
    color: var(--fg-muted); cursor: pointer; font-family: inherit;
    transition: all 0.3s; min-height: 36px;
  }
  .sidebar-delete:hover { border-color: var(--danger); color: var(--danger); }

  .sidebar-actions {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .sidebar-actions .btn-data {
    flex: 1; font-size: 0.72rem; padding: 6px 4px;
  }

  /* 右侧内容 */
  .content-area { min-width: 0; }

  /* 内容标签页导航 */
  .content-tabs {
    display: flex; gap: 4px; margin-bottom: 20px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px;
    animation: fadeUp 0.6s ease 0.1s both;
  }
  .content-tab {
    flex: 1; padding: 10px 8px; text-align: center;
    font-size: 0.82rem; font-weight: 500; color: var(--fg-muted);
    background: transparent; border: none; border-radius: 8px;
    cursor: pointer; font-family: inherit; transition: all 0.25s;
    min-height: 40px;
  }
  .content-tab:hover { color: var(--fg); background: rgba(255,255,255,0.03); }
  .content-tab.active {
    background: var(--accent-dim); color: var(--accent);
    font-weight: 700;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 信息汇总表格 */
  .summary-table-wrap {
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .summary-table {
    width: 100%; border-collapse: collapse;
    font-size: 0.82rem; min-width: 600px;
  }
  .summary-table th, .summary-table td {
    padding: 10px 12px; text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .summary-table th {
    background: rgba(255,255,255,0.03); color: var(--fg-muted);
    font-weight: 500; position: sticky; top: 0; white-space: nowrap;
  }
  .summary-table th:first-child, .summary-table td:first-child {
    text-align: left; white-space: nowrap; font-weight: 500;
  }
  .summary-table td { color: var(--fg); }
  .summary-table tr:hover td { background: rgba(255,255,255,0.02); }
  .summary-table .dim-row td:first-child {
    color: var(--accent); font-weight: 600;
  }
  .summary-table .total-row td {
    border-top: 2px solid var(--accent); font-weight: 700; color: var(--accent);
  }
  .summary-table .note-row td {
    font-size: 0.78rem; color: var(--fg-muted); font-style: italic;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* 图表对比 */
  .chart-section {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px; margin-bottom: 20px;
  }
  .chart-section h3 {
    font-size: 0.95rem; font-weight: 600; margin-bottom: 16px; color: var(--fg);
  }
  .radar-chart {
    display: flex; justify-content: center; align-items: center;
    padding: 20px 0;
  }
  .bar-chart { display: flex; flex-direction: column; gap: 16px; }
  .bar-chart-item {
    display: flex; align-items: center; gap: 12px;
  }
  .bar-chart-label {
    min-width: 80px; font-size: 0.82rem; color: var(--fg-muted);
    text-align: right; flex-shrink: 0;
  }
  .bar-chart-track {
    flex: 1; height: 28px; background: var(--border);
    border-radius: 6px; overflow: hidden; position: relative;
    display: flex;
  }
  .bar-chart-fill {
    height: 100%; border-radius: 6px;
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 8px; font-size: 0.72rem; font-weight: 700;
    min-width: 30px;
  }
  .chart-legend {
    display: flex; gap: 16px; justify-content: center;
    margin-top: 16px; flex-wrap: wrap;
  }
  .chart-legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.8rem; color: var(--fg-muted);
  }
  .chart-legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  /* 权重编辑 */
  .weight-edit-section {
    margin-top: 16px; padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .weight-edit-title {
    font-size: 0.8rem; color: var(--fg-muted); margin-bottom: 10px;
    font-weight: 500;
  }
  .weight-edit-item {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 6px; font-size: 0.78rem;
  }
  .weight-edit-item .we-icon { font-size: 0.9rem; width: 20px; text-align: center; }
  .weight-edit-item .we-name { flex: 1; color: var(--fg-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .weight-edit-item input[type="number"] {
    width: 48px; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 4px; padding: 4px 6px; color: var(--fg); font-size: 0.78rem;
    font-family: inherit; text-align: center; outline: none;
  }
  .weight-edit-item input:focus { border-color: var(--accent); }
  .weight-edit-item .we-unit { color: var(--fg-muted); font-size: 0.72rem; }
  .weight-total {
    display: flex; justify-content: space-between; margin-top: 8px;
    padding-top: 8px; border-top: 1px solid var(--border);
    font-size: 0.78rem; color: var(--fg-muted);
  }
  .weight-total.error { color: var(--danger); }

  /* 维度卡片 */
  .dimensions { display: flex; flex-direction: column; gap: 16px; }
  .dim-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px;
    transition: border-color 0.3s; animation: fadeUp 0.5s ease both;
  }
  .dim-card:hover { border-color: rgba(232,168,56,0.3); }
  .dim-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }
  .dim-left { display: flex; align-items: center; gap: 12px; }
  .dim-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; background: var(--accent-dim);
  }
  .dim-name { font-weight: 700; font-size: 1rem; }
  .dim-weight {
    background: var(--accent-dim); color: var(--accent);
    font-size: 0.82rem; font-weight: 700;
    padding: 4px 12px; border-radius: 20px;
  }
  .dim-desc {
    color: var(--fg-muted); font-size: 0.85rem;
    margin-bottom: 14px; font-weight: 300;
    line-height: 1.6; padding-left: 48px;
  }

  /* 清单输入区 */
  .dim-fields {
    padding-left: 48px; margin-bottom: 14px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px 20px;
  }
  .field-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.84rem; color: var(--fg-muted);
  }
  .field-label {
    min-width: 80px; flex-shrink: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .field-item input[type="number"],
  .field-item input[type="text"] {
    flex: 1; min-width: 0;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px;
    color: var(--fg); font-size: 0.84rem; font-family: inherit;
    outline: none; transition: border-color 0.3s;
  }
  .field-item input:focus { border-color: var(--accent); }
  .field-item input::placeholder { color: rgba(138,141,151,0.5); font-size: 0.78rem; }
  .field-item select {
    flex: 1; min-width: 0;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px;
    color: var(--fg); font-size: 0.84rem; font-family: inherit;
    outline: none; cursor: pointer; transition: border-color 0.3s;
  }
  .field-item select:focus { border-color: var(--accent); }
  .field-item select option { background: var(--bg-card); color: var(--fg); }
  .field-item input[type="checkbox"] {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border: 1.5px solid var(--border);
    border-radius: 4px; background: transparent;
    cursor: pointer; flex-shrink: 0; transition: all 0.2s; position: relative;
  }
  .field-item input[type="checkbox"]:checked {
    background: var(--accent); border-color: var(--accent);
  }
  .field-item input[type="checkbox"]:checked::after {
    content: '✓'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); font-size: 11px;
    color: var(--bg); font-weight: 700;
  }
  .field-unit {
    color: var(--fg-muted); font-size: 0.78rem; flex-shrink: 0;
  }
  .field-score {
    min-width: 22px; text-align: center;
    font-weight: 700; font-size: 0.78rem; color: var(--accent);
    opacity: 0.7; flex-shrink: 0;
  }
  .field-item-full {
    grid-column: 1 / -1;
  }
  .field-item-full input[type="text"] {
    flex: 1; min-width: 0;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px;
    color: var(--fg); font-size: 0.84rem; font-family: inherit;
    outline: none; transition: border-color 0.3s;
  }
  .field-item-full input:focus { border-color: var(--accent); }
  .field-item-full input::placeholder { color: rgba(138,141,151,0.5); font-size: 0.78rem; }

  /* 整体备注 */
  .overall-note-card .dim-fields { padding-left: 48px; }
  .overall-note-input {
    width: 100%; min-height: 80px; resize: vertical;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 12px;
    color: var(--fg); font-size: 0.84rem; font-family: inherit;
    outline: none; transition: border-color 0.3s; line-height: 1.5;
  }
  .overall-note-input:focus { border-color: var(--accent); }
  .overall-note-input::placeholder { color: rgba(138,141,151,0.5); }

  /* 自动评分进度 */
  .auto-score-row {
    padding-left: 48px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .auto-score-label {
    font-size: 0.78rem; color: var(--fg-muted);
  }
  .auto-score-bar {
    flex: 1; height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .auto-score-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* 评分滑块 */
  .score-row {
    display: flex; align-items: center; gap: 16px; padding-left: 48px;
  }
  .score-row input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 6px; border-radius: 3px; background: var(--border);
    outline: none;
  }
  .score-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    box-shadow: 0 0 10px var(--accent-glow); transition: transform 0.2s;
  }
  .score-row input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .score-val {
    min-width: 42px; text-align: center;
    font-weight: 700; font-size: 1.1rem; color: var(--accent);
  }
  .score-auto-badge {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
    background: var(--accent-dim); color: var(--accent);
    white-space: nowrap;
  }
  .score-manual-badge {
    font-size: 0.7rem; padding: 2px 8px; border-radius: 10px;
    background: rgba(232,88,88,0.15); color: var(--danger);
    white-space: nowrap; cursor: pointer;
  }

  /* 结果 */
  .results {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px;
    animation: fadeUp 0.8s ease 0.3s both;
  }
  .results h2 {
    font-family: 'Noto Serif SC', serif; font-weight: 700;
    font-size: 1.3rem; margin-bottom: 24px; color: var(--fg);
  }
  .result-list { display: flex; flex-direction: column; gap: 14px; }
  .result-item {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 18px; background: rgba(255,255,255,0.02);
    border-radius: 10px; transition: background 0.3s;
  }
  .result-item:hover { background: rgba(255,255,255,0.04); }
  .result-rank {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 0.9rem; flex-shrink: 0;
  }
  .result-rank.gold { background: var(--accent); color: var(--bg); }
  .result-rank.silver { background: #8a8d97; color: var(--bg); }
  .result-rank.bronze { background: #a06840; color: var(--bg); }
  .result-rank.normal { background: var(--border); color: var(--fg-muted); }
  .result-name { flex: 1; font-weight: 500; font-size: 0.95rem; }
  .result-bar-wrap {
    flex: 2; height: 8px; background: var(--border);
    border-radius: 4px; overflow: hidden;
  }
  .result-bar {
    height: 100%; border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .result-score {
    min-width: 52px; text-align: right;
    font-weight: 700; font-size: 1.05rem;
  }
  .result-detail {
    margin-top: 16px; padding: 16px;
    background: rgba(255,255,255,0.02); border-radius: 10px;
  }
  .result-detail-title {
    font-size: 0.88rem; font-weight: 500; color: var(--fg);
    margin-bottom: 10px; cursor: pointer;
  }
  .result-detail-title:hover { color: var(--accent); }
  .result-detail-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 4px 20px;
  }
  .result-detail-item {
    display: flex; justify-content: space-between;
    font-size: 0.8rem; padding: 3px 0;
  }
  .result-detail-item .dl { color: var(--fg-muted); }
  .result-detail-item .dv { color: var(--fg); font-weight: 500; }

  /* 空状态 */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--fg-muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p { font-size: 0.95rem; font-weight: 300; }

  /* 权重说明 */
  .weight-legend {
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .weight-legend h3 {
    font-size: 0.88rem; color: var(--fg-muted);
    font-weight: 500; margin-bottom: 12px;
  }
  .weight-bars {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px 24px;
  }
  .weight-bar-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.82rem; color: var(--fg-muted);
  }
  .weight-bar-item .wb-label { min-width: 70px; }
  .weight-bar-item .wb-track {
    flex: 1; height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .weight-bar-item .wb-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; opacity: 0.6;
  }
  .weight-bar-item .wb-val { min-width: 32px; text-align: right; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* iPad / 触控优化 */
  .field-item input[type="number"],
  .field-item input[type="text"],
  .field-item select {
    min-height: 36px; font-size: 16px; /* 防止iOS缩放 */
  }
  .field-item input[type="checkbox"] {
    width: 22px; height: 22px;
  }
  .field-item input[type="checkbox"]:checked::after {
    font-size: 13px;
  }
  .score-row input[type="range"] {
    height: 8px;
  }
  .score-row input[type="range"]::-webkit-slider-thumb {
    width: 28px; height: 28px;
  }
  .house-item .del-btn { opacity: 0.5; } /* 触控设备始终可见 */
  .btn-add-small { min-height: 44px; }

  /* 存储状态指示器 */
  .save-indicator {

  try {
    const data = { houses, activeHouse, scores, autoScores, fieldValues, manualOverride, overallNotes, weights: DIMENSIONS.map(d => ({ id: d.id, weight: d.weight })) };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    setTimeout(() => {
      indicator.textContent = '已保存';
      indicator.className = 'save-indicator saved';
      setTimeout(() => { indicator.className = 'save-indicator'; }, 1500);
    }, 200);
  } catch (e) {
    indicator.textContent = '保存失败';
    indicator.className = 'save-indicator saving';
    setTimeout(() => { indicator.className = 'save-indicator'; }, 2000);
  }
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    houses = data.houses || [];
    activeHouse = data.activeHouse || null;
    scores = data.scores || {};
    autoScores = data.autoScores || {};
    fieldValues = data.fieldValues || {};
    manualOverride = data.manualOverride || {};
    overallNotes = data.overallNotes || {};
    // 恢复权重
    if (data.weights) {
      data.weights.forEach(w => {
        const dim = DIMENSIONS.find(d => d.id === w.id);
        if (dim) dim.weight = w.weight;
      });
    }
    // 确保每个房源都有新维度的字段（兼容数据结构变更）
    houses.forEach(h => {
      DIMENSIONS.forEach(d => {
        if (!fieldValues[h.id]) fieldValues[h.id] = {};
        if (!fieldValues[h.id][d.id]) fieldValues[h.id][d.id] = {};
        if (!scores[h.id]) scores[h.id] = {};
        if (!scores[h.id][d.id]) scores[h.id][d.id] = 5;
        if (!autoScores[h.id]) autoScores[h.id] = {};
        if (!autoScores[h.id][d.id]) autoScores[h.id][d.id] = 5;
        if (!manualOverride[h.id]) manualOverride[h.id] = {};
        if (manualOverride[h.id][d.id] === undefined) manualOverride[h.id][d.id] = false;
        d.fields.forEach(f => {
          if (fieldValues[h.id][d.id][f.key] === undefined) {
            fieldValues[h.id][d.id][f.key] = f.type === 'check' ? false : '';
          }
        });
      });
    });
    return true;
  } catch (e) {
    return false;
  }
}

function exportData() {
  const data = { houses, scores, autoScores, fieldValues, manualOverride, overallNotes, weights: DIMENSIONS.map(d => ({ id: d.id, weight: d.weight })), exportTime: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `租房评分_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData() {
  document.getElementById('importFile').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.houses || !data.scores) throw new Error('数据格式错误');
      houses = data.houses || [];
      scores = data.scores || {};
      autoScores = data.autoScores || {};
      fieldValues = data.fieldValues || {};
      manualOverride = data.manualOverride || {};
      overallNotes = data.overallNotes || {};
      if (data.weights) {
        data.weights.forEach(w => {
          const dim = DIMENSIONS.find(d => d.id === w.id);
          if (dim) dim.weight = w.weight;
        });
      }
      activeHouse = houses.length ? houses[0].id : null;
      saveData();
      render();
      alert('导入成功！');
    } catch (err) {
      alert('导入失败：' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function clearAllData() {
  if (!confirm('确定要清除所有房源数据吗？此操作不可恢复。')) return;
  houses = [];
  activeHouse = null;
  scores = {};
  autoScores = {};
  fieldValues = {};
  manualOverride = {};
  overallNotes = {};
  localStorage.removeItem(STORAGE_KEY);
  render();
}

function addHouse() {
  const input = document.getElementById('houseInput');
  const name = input.value.trim();
  if (!name) return;
  if (houses.length >= 8) { alert('最多添加8个房源进行对比'); return; }
  const id = genId();
  houses.push({ id, name });
  scores[id] = {};
  autoScores[id] = {};
  fieldValues[id] = {};
  manualOverride[id] = {};
  overallNotes[id] = '';
  DIMENSIONS.forEach(d => {
    scores[id][d.id] = 5;
    autoScores[id][d.id] = 5;
    fieldValues[id][d.id] = {};
    manualOverride[id][d.id] = false;
    d.fields.forEach(f => {
      if (f.type === 'check') fieldValues[id][d.id][f.key] = false;
      else if (f.type === 'select') fieldValues[id][d.id][f.key] = '';
      else fieldValues[id][d.id][f.key] = '';
    });
  });
  input.value = '';
  activeHouse = id;
  saveData();
  render();
}

document.getElementById('houseInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addHouse();
});

function removeHouse(id) {
  houses = houses.filter(h => h.id !== id);
  delete scores[id]; delete autoScores[id];
  delete fieldValues[id]; delete manualOverride[id];
  delete overallNotes[id];
  if (activeHouse === id) activeHouse = houses.length ? houses[0].id : null;
  saveData();
  render();
}

function switchHouse(id) { activeHouse = id; saveData(); render(); }

// 计算单个字段的得分
function calcFieldScore(dim, field, value) {
  if (value === '' || value === undefined || value === null) return null;
  if (field.type === 'number') {
    const num = parseFloat(value);
    if (isNaN(num)) return null;
    const { best, worst } = field.scoring;
    if (best === worst) return 10;
    // lower is better by default for rent/commute etc.
    const ratio = (worst - num) / (worst - best);
    return Math.round(Math.min(10, Math.max(1, ratio * 9 + 1)) * 10) / 10;
  }
  if (field.type === 'select') {
    const opt = field.options.find(o => o.label === value);
    return opt ? opt.score : null;
  }
  if (field.type === 'check') {
    return value ? field.scoring.checked : field.scoring.unchecked;
  }
  return null;
}

// 计算维度自动得分
function calcAutoScore(houseId, dimId) {
  const dim = DIMENSIONS.find(d => d.id === dimId);
  if (!dim) return 5;
  const vals = fieldValues[houseId][dimId];
  let total = 0, count = 0;
  dim.fields.forEach(f => {
    const s = calcFieldScore(dim, f, vals[f.key]);
    if (s !== null) { total += s; count++; }
  });
  return count > 0 ? Math.round(total / count * 10) / 10 : 5;
}

function setFieldValue(dimId, fieldKey, value) {
  if (!activeHouse) return;
  fieldValues[activeHouse][dimId][fieldKey] = value;
  const auto = calcAutoScore(activeHouse, dimId);
  autoScores[activeHouse][dimId] = auto;
  if (!manualOverride[activeHouse][dimId]) {
    scores[activeHouse][dimId] = auto;
  }
  // 局部更新，不重建整个表单
  updateDimScoreDisplay(dimId);
  saveData();
  renderResults();
  renderTable();
  renderChart();
}

function setManualScore(dimId, val) {
  if (!activeHouse) return;
  scores[activeHouse][dimId] = parseInt(val);
  manualOverride[activeHouse][dimId] = true;
  saveData();
  renderResults();
}

function resetToAuto(dimId) {
  if (!activeHouse) return;
  manualOverride[activeHouse][dimId] = false;
  scores[activeHouse][dimId] = autoScores[activeHouse][dimId];
  saveData();
  // 恢复自动时需要重新渲染该维度（更新滑块和badge）
  renderDimensions();
  renderResults();
}

function setOverallNote(val) {
  if (!activeHouse) return;
  overallNotes[activeHouse] = val;
  saveData();
}

// 局部更新某个维度的分数显示，不重建输入控件
function updateDimScoreDisplay(dimId) {
  const auto = autoScores[activeHouse][dimId];
  const val = scores[activeHouse][dimId];
  const pct = (auto / 10 * 100).toFixed(0);
  const barColor = auto >= 7 ? 'var(--success)' : auto >= 4 ? 'var(--accent)' : 'var(--danger)';

  // 更新自动评分条
  const barFill = document.getElementById('asbar_' + dimId);
  const barText = document.getElementById('astxt_' + dimId);
  if (barFill) { barFill.style.width = pct + '%'; barFill.style.background = barColor; }
  if (barText) { barText.textContent = auto.toFixed(1); barText.style.color = barColor; }

  // 更新滑块值
  const slider = document.getElementById('slider_' + dimId);
  const sliderVal = document.getElementById('sval_' + dimId);
  if (slider && !manualOverride[activeHouse][dimId]) slider.value = val;
  if (sliderVal) sliderVal.textContent = val;

  // 更新各字段分数
  const dim = DIMENSIONS.find(d => d.id === dimId);
  if (dim) {
    dim.fields.forEach(f => {
      const fsEl = document.getElementById('fs_' + dimId + '_' + f.key);
      if (fsEl) {
        const s = calcFieldScore(dim, f, fieldValues[activeHouse][dimId][f.key]);
        fsEl.textContent = s !== null ? s : '';
      }
    });
  }
}

function render() {
  renderHouseList();
  renderDimensions();
  renderResults();
  renderTable();
  renderChart();
  renderWeightEdit();
}

function renderHouseList() {
  const el = document.getElementById('houseList');

    delBtn.style.display = 'none';

  }
  delBtn.style.display = '';
  el.innerHTML = houses.map(h => `
    <div class="house-item ${h.id === activeHouse ? 'active' : ''}" onclick="switchHouse('${h.id}')">
      <span class="house-item-name">${h.name}</span>
      <span class="del-btn" onclick="event.stopPropagation(); removeHouse('${h.id}')">✕</span>
    </div>

function deleteCurrentHouse() {
  if (!activeHouse) return;
  const h = houses.find(h => h.id === activeHouse);
  if (h && confirm(`确定删除「${h.name}」吗？`)) {
    removeHouse(activeHouse);
  }
}

function renderField(dim, field, houseId) {
  const dimId = dim.id;
  const val = fieldValues[houseId][dimId][field.key];
  const score = calcFieldScore(dim, field, val);
  const scoreId = `fs_${dimId}_${field.key}`;

  if (field.type === 'number') {
    return `
      <div class="field-item">
        <span class="field-label">${field.label}</span>
        <input type="number" value="${val || ''}" placeholder="${field.placeholder || ''}"
          oninput="setFieldValue('${dimId}','${field.key}',this.value)">
        <span class="field-unit">${field.unit || ''}</span>
        <span class="field-score" id="${scoreId}">${score !== null ? score : ''}</span>
      </div>`;
  }
  if (field.type === 'select') {
    return `
      <div class="field-item">
        <span class="field-label">${field.label}</span>
        <select onchange="setFieldValue('${dimId}','${field.key}',this.value)">
          <option value="">请选择</option>
          ${field.options.map(o => `<option ${val === o.label ? 'selected' : ''}>${o.label}</option>`).join('')}
        </select>
        <span class="field-score" id="${scoreId}">${score !== null ? score : ''}</span>
      </div>`;
  }
  if (field.type === 'check') {
    return `
      <div class="field-item">
        <input type="checkbox" ${val ? 'checked' : ''}
          onchange="setFieldValue('${dimId}','${field.key}',this.checked)">
        <span class="field-label">${field.label}</span>
        <span class="field-score" id="${scoreId}">${score !== null ? score : ''}</span>
      </div>`;
  }
  if (field.type === 'text') {
    return `
      <div class="field-item field-item-full">
        <span class="field-label">${field.label}</span>
        <input type="text" value="${val || ''}" placeholder="${field.placeholder || ''}"
          oninput="setFieldValue('${dimId}','${field.key}',this.value)">
      </div>`;
  }
  return '';
}

    return `
    <div class="dim-card" style="animation-delay: ${i * 0.04}s">
      <div class="dim-header">
        <div class="dim-left">
          <div class="dim-icon">${d.icon}</div>
          <span class="dim-name">${d.name}</span>
        </div>
        <span class="dim-weight">权重 ${d.weight}%</span>
      </div>
      <div class="dim-desc">${d.desc}</div>

        ${d.fields.map(f => renderField(d, f, activeHouse)).join('')}

          <div class="auto-score-bar-fill" id="asbar_${d.id}" style="width:${pct}%;background:${barColor}"></div>
        </div>
        <span id="astxt_${d.id}" style="font-size:0.82rem;font-weight:700;color:${barColor}">${auto.toFixed(1)}</span>
      </div>
      <div class="score-row">
        <span style="color:var(--fg-muted);font-size:0.8rem">1</span>
        <input type="range" id="slider_${d.id}" min="1" max="10" value="${val}"

        ${isManual

          : `<span class="score-auto-badge">自动</span>`
        }
      </div>

  }).join('') + `
  <div class="dim-card overall-note-card">
    <div class="dim-header">
      <div class="dim-left">
        <div class="dim-icon">📝</div>
        <span class="dim-name">整体备注</span>
      </div>
    </div>
    <div class="dim-desc">对该房源的整体印象、注意事项等</div>
    <div class="dim-fields" style="grid-template-columns:1fr">

        <textarea class="overall-note-input" placeholder="输入整体备注..."
          oninput="setOverallNote(this.value)">${overallNotes[activeHouse] || ''}</textarea>
      </div>
    </div>
  </div>`;
}

function renderResults() {
  const el = document.getElementById('resultContent');
  if (!houses.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🏠</div><p>添加房源并填写信息后，这里将显示综合排名</p></div>`;
    return;
  }

  const ranked = houses.map(h => {
    let total = 0;
    DIMENSIONS.forEach(d => {
      total += (scores[h.id][d.id] / 10) * d.weight;
    });
    return { ...h, score: total };
  }).sort((a, b) => b.score - a.score);

  el.innerHTML = `
    <div class="result-list">
      ${ranked.map((h, i) => {
        const pct = (h.score / 100 * 100).toFixed(1);
        const rankClass = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : 'normal';
        const barColor = i === 0 ? 'var(--accent)' : i === 1 ? '#8a8d97' : i === 2 ? '#a06840' : 'var(--fg-muted)';
        return `
        <div class="result-item">
          <div class="result-rank ${rankClass}">${i + 1}</div>
          <span class="result-name">${h.name}</span>
          <div class="result-bar-wrap">
            <div class="result-bar" style="width:${pct}%;background:${barColor}"></div>
          </div>
          <span class="result-score" style="color:${barColor}">${h.score.toFixed(1)}</span>
        </div>`;
      }).join('')}
    </div>
    ${ranked.length > 0 ? `
    <div class="result-detail">
      <div class="result-detail-title" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'grid':'none'">
        ▾ 各维度得分对比
      </div>
      <div class="result-detail-grid" style="display:none">
        ${DIMENSIONS.map(d => {
          const items = ranked.map(h => {
            const s = scores[h.id][d.id];
            return `<span class="dv" style="color:${s>=7?'var(--success)':s>=4?'var(--accent)':'var(--danger)'}">${h.name}: ${s}</span>`;
          }).join('');
          return `<div class="result-detail-item"><span class="dl">${d.name}</span>${items}</div>`;
        }).join('')}
      </div>
    </div>` : ''}

      <h3>权重分布</h3>
      <div class="weight-bars">
        ${DIMENSIONS.map(d => `
          <div class="weight-bar-item">
            <span class="wb-label">${d.name}</span>
            <div class="wb-track"><div class="wb-fill" style="width:${d.weight * 5}%"></div></div>
            <span class="wb-val">${d.weight}%</span>

}

let currentContentTab = 'form';

// ====== 信息汇总表格 ======
function renderTable() {
  const el = document.getElementById('tableContent');
  if (!houses.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>添加房源后，这里将显示信息汇总表格</p></div>`;
    return;
  }

  // 构建表格：行=维度+字段，列=房源
  let html = '<div class="summary-table-wrap"><table class="summary-table"><thead><tr><th>项目</th>';
  houses.forEach(h => { html += `<th>${h.name}</th>`; });
  html += '</tr></thead><tbody>';

  // 各维度
  DIMENSIONS.forEach(d => {
    html += `<tr class="dim-row"><td>${d.icon} ${d.name}</td>`;
    houses.forEach(h => {
      const s = scores[h.id][d.id];
      const color = s >= 7 ? 'var(--success)' : s >= 4 ? 'var(--accent)' : 'var(--danger)';
      html += `<td style="color:${color};font-weight:600">${s}</td>`;
    });
    html += '</tr>';

    // 每个字段
    d.fields.forEach(f => {
      if (f.type === 'text') return; // 备注单独处理
      html += `<tr><td style="padding-left:24px;color:var(--fg-muted)">${f.label}</td>`;
      houses.forEach(h => {
        const val = fieldValues[h.id][d.id][f.key];
        let display = val;
        if (f.type === 'check') display = val ? '✓' : '✗';
        if (f.type === 'number' && val) display = val + (f.unit || '');
        if (!val && val !== 0 && val !== false) display = '-';
        html += `<td>${display}</td>`;
      });
      html += '</tr>';
    });

    // 备注行
    const hasNotes = houses.some(h => fieldValues[h.id][d.id].note);
    if (hasNotes) {
      html += `<tr class="note-row"><td style="padding-left:24px">备注</td>`;
      houses.forEach(h => {
        html += `<td title="${fieldValues[h.id][d.id].note || ''}">${fieldValues[h.id][d.id].note || '-'}</td>`;
      });
      html += '</tr>';
    }
  });

  // 整体备注
  const hasOverallNotes = houses.some(h => overallNotes[h.id]);
  if (hasOverallNotes) {
    html += `<tr class="note-row"><td style="color:var(--accent)">整体备注</td>`;
    houses.forEach(h => {
      html += `<td title="${overallNotes[h.id] || ''}">${overallNotes[h.id] || '-'}</td>`;
    });
    html += '</tr>';
  }

  // 总分行
  html += `<tr class="total-row"><td>综合得分</td>`;
  houses.forEach(h => {
    let total = 0;
    DIMENSIONS.forEach(d => { total += (scores[h.id][d.id] / 10) * d.weight; });
    html += `<td>${total.toFixed(1)}</td>`;
  });
  html += '</tr>';

  html += '</tbody></table></div>';
  el.innerHTML = html;
}

// ====== 图表对比 ======
const CHART_COLORS = ['#e8a838', '#38c878', '#5b8def', '#e85858', '#a855f7', '#06b6d4', '#f97316', '#ec4899'];

function renderChart() {
  const el = document.getElementById('chartContent');
  if (!houses.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📈</div><p>添加房源后，这里将显示图表对比</p></div>`;
    return;
  }

  // 计算各房源总分
  const houseScores = houses.map(h => {
    let total = 0;
    DIMENSIONS.forEach(d => { total += (scores[h.id][d.id] / 10) * d.weight; });
    return { ...h, total };
  }).sort((a, b) => b.total - a.total);

  // 1. 综合得分柱状图
  let html = '<div class="chart-section"><h3>综合得分对比</h3><div class="bar-chart">';
  houseScores.forEach((h, i) => {
    const pct = h.total.toFixed(1);
    const color = CHART_COLORS[i % CHART_COLORS.length];
    html += `
      <div class="bar-chart-item">
        <span class="bar-chart-label">${h.name}</span>
        <div class="bar-chart-track">
          <div class="bar-chart-fill" style="width:${pct}%;background:${color};color:#0f1117">${pct}</div>
        </div>
      </div>`;
  });
  html += '</div></div>';

  // 2. 各维度雷达图 (SVG)
  html += '<div class="chart-section"><h3>各维度得分雷达图</h3><div class="radar-chart">';
  html += renderRadarSVG(houseScores);
  html += '</div>';

  // 图例
  html += '<div class="chart-legend">';
  houseScores.forEach((h, i) => {
    html += `<div class="chart-legend-item"><div class="chart-legend-dot" style="background:${CHART_COLORS[i % CHART_COLORS.length]}"></div>${h.name}</div>`;
  });
  html += '</div></div>';

  // 3. 各维度柱状图
  html += '<div class="chart-section"><h3>各维度得分对比</h3>';
  DIMENSIONS.forEach(d => {
    html += `<div style="margin-bottom:12px"><div style="font-size:0.82rem;color:var(--fg-muted);margin-bottom:6px">${d.icon} ${d.name}</div><div class="bar-chart">`;
    houseScores.forEach((h, i) => {
      const s = scores[h.id][d.id];
      const pct = (s / 10 * 100).toFixed(0);
      const color = CHART_COLORS[i % CHART_COLORS.length];
      html += `
        <div class="bar-chart-item">
          <span class="bar-chart-label">${h.name}</span>
          <div class="bar-chart-track">
            <div class="bar-chart-fill" style="width:${pct}%;background:${color};color:#0f1117">${s}</div>
          </div>
        </div>`;
    });
    html += '</div></div>';
  });
  html += '</div>';

  el.innerHTML = html;
}

function renderRadarSVG(houseScores) {
  const n = DIMENSIONS.length;
  const cx = 200, cy = 200, r = 160;
  const angleStep = (2 * Math.PI) / n;

  // 背景网格
  let svg = `<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">`;
  // 画5层同心多边形
  for (let level = 1; level <= 5; level++) {
    const lr = r * level / 5;
    let points = '';
    for (let i = 0; i < n; i++) {
      const angle = -Math.PI / 2 + i * angleStep;
      points += `${cx + lr * Math.cos(angle)},${cy + lr * Math.sin(angle)} `;
    }
    svg += `<polygon points="${points.trim()}" fill="none" stroke="#2a2d38" stroke-width="1"/>`;
  }
  // 轴线
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI / 2 + i * angleStep;
    svg += `<line x1="${cx}" y1="${cy}" x2="${cx + r * Math.cos(angle)}" y2="${cy + r * Math.sin(angle)}" stroke="#2a2d38" stroke-width="1"/>`;
  }
  // 标签
  for (let i = 0; i < n; i++) {
    const angle = -Math.PI / 2 + i * angleStep;
    const lx = cx + (r + 24) * Math.cos(angle);
    const ly = cy + (r + 24) * Math.sin(angle);
    svg += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="#8a8d97" font-size="10" font-family="Noto Sans SC, sans-serif">${DIMENSIONS[i].name}</text>`;
  }

  // 每个房源的多边形
  houseScores.forEach((h, hi) => {
    let points = '';
    for (let i = 0; i < n; i++) {
      const s = scores[h.id][DIMENSIONS[i].id];
      const lr = r * s / 10;
      const angle = -Math.PI / 2 + i * angleStep;
      points += `${cx + lr * Math.cos(angle)},${cy + lr * Math.sin(angle)} `;
    }
    const color = CHART_COLORS[hi % CHART_COLORS.length];
    svg += `<polygon points="${points.trim()}" fill="${color}" fill-opacity="0.12" stroke="${color}" stroke-width="2"/>`;
  });

  svg += '</svg>';
  return svg;
}

// ====== 权重编辑 ======
function renderWeightEdit() {
  const sidebar = document.querySelector('.sidebar');
  let section = document.getElementById('weightEditSection');
  if (!section) {
    section = document.createElement('div');
    section.id = 'weightEditSection';
    section.className = 'weight-edit-section';
    sidebar.insertBefore(section, sidebar.querySelector('.sidebar-actions'));
  }
  const total = DIMENSIONS.reduce((s, d) => s + d.weight, 0);
  const isError = total !== 100;
  section.innerHTML = `
    <div class="weight-edit-title">权重设置</div>
    ${DIMENSIONS.map(d => `
      <div class="weight-edit-item">
        <span class="we-icon">${d.icon}</span>
        <span class="we-name">${d.name}</span>
        <input type="number" value="${d.weight}" min="0" max="50"
          onchange="updateWeight('${d.id}', this.value)">
        <span class="we-unit">%</span>
      </div>
    `).join('')}
    <div class="weight-total ${isError ? 'error' : ''}">
      <span>合计</span>
      <span>${total}% ${isError ? '(需等于100)' : ''}</span>
    </div>
  `;
}

function updateWeight(dimId, val) {
  const dim = DIMENSIONS.find(d => d.id === dimId);
  if (dim) {
    dim.weight = Math.max(0, Math.min(50, parseInt(val) || 0));
    saveData();
    render();
  }
}
loadData();
render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
